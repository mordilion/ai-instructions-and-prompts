name: Validate Rules

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Configuration & Rules
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Validate JSON syntax
        run: |
          echo "Validating config.json..."
          jq empty .ai-iap/config.json
          echo "✓ config.json is valid JSON"
      
      - name: Check file structure
        run: |
          echo "Checking directory structure..."
          test -d .ai-iap/rules || { echo "Missing .ai-iap/rules directory"; exit 1; }
          test -f .ai-iap/config.json || { echo "Missing config.json"; exit 1; }
          test -f .ai-iap/setup.sh || { echo "Missing setup.sh"; exit 1; }
          test -f .ai-iap/setup-common.sh || { echo "Missing setup-common.sh"; exit 1; }
          test -f .ai-iap/setup-rules.sh || { echo "Missing setup-rules.sh"; exit 1; }
          test -f .ai-iap/setup-agents.sh || { echo "Missing setup-agents.sh"; exit 1; }
          test -f .ai-iap/setup.ps1 || { echo "Missing setup.ps1"; exit 1; }
          test -f .ai-iap/setup-common.ps1 || { echo "Missing setup-common.ps1"; exit 1; }
          test -f .ai-iap/setup-rules.ps1 || { echo "Missing setup-rules.ps1"; exit 1; }
          test -f .ai-iap/setup-agents.ps1 || { echo "Missing setup-agents.ps1"; exit 1; }
          echo "✓ Directory structure is valid"
      
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      
      - name: Lint markdown files
        run: |
          echo "Linting markdown files..."
          markdownlint '**/*.md' --ignore node_modules || {
            echo "❌ Markdown linting failed"
            echo "Run 'markdownlint **/*.md' locally to see all issues"
            exit 1
          }
          echo "✓ All markdown files pass linting"
      
      - name: Validate markdown files
        run: |
          echo "Checking markdown files..."
          find .ai-iap/rules -name "*.md" -type f | while read -r file; do
            if [ ! -s "$file" ]; then
              echo "Empty file: $file"
              exit 1
            fi
            if ! head -1 "$file" | grep -q "^#"; then
              echo "Missing header: $file"
              exit 1
            fi
          done
          echo "✓ All markdown files are valid"
      
      - name: Check for broken links in README
        run: |
          echo "Checking README links..."
          if grep -q "](.*\.md)" README.md; then
            echo "✓ README contains internal links"
          fi

  test-linux:
    name: Test Bash Scripts
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Install dependencies
        run: |
          echo "Installing jq..."
          sudo apt-get update -qq
          sudo apt-get install -y jq
          jq --version
          echo "✓ jq is available"
      
      - name: Validate bash syntax
        run: |
          echo "Validating bash scripts..."
          bash -n .ai-iap/setup.sh
          echo "✓ setup.sh syntax is valid"
          bash -n .ai-iap/setup-common.sh
          echo "✓ setup-common.sh syntax is valid"
          bash -n .ai-iap/setup-rules.sh
          echo "✓ setup-rules.sh syntax is valid"
          bash -n .ai-iap/setup-agents.sh
          echo "✓ setup-agents.sh syntax is valid"
          bash -n .ai-iap/validate.sh
          echo "✓ validate.sh syntax is valid"
          bash -n .ai-iap/validate-config.sh
          echo "✓ validate-config.sh syntax is valid"
          bash -n .ai-iap/verify-extension.sh
          echo "✓ verify-extension.sh syntax is valid"
      
      - name: Run file validation tests
        run: |
          chmod +x .ai-iap/validate.sh
          ./.ai-iap/validate.sh
      
      - name: Run config validation tests
        run: |
          chmod +x .ai-iap/validate-config.sh
          ./.ai-iap/validate-config.sh
      
      - name: Run extension system tests
        run: |
          chmod +x .ai-iap/verify-extension.sh
          ./.ai-iap/verify-extension.sh

  test-windows:
    name: Test PowerShell Scripts
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          Write-Host "Validating PowerShell scripts..."
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content .ai-iap\setup.ps1 -Raw), [ref]$null)
          Write-Host "✓ setup.ps1 syntax is valid"
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content .ai-iap\setup-common.ps1 -Raw), [ref]$null)
          Write-Host "✓ setup-common.ps1 syntax is valid"
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content .ai-iap\setup-rules.ps1 -Raw), [ref]$null)
          Write-Host "✓ setup-rules.ps1 syntax is valid"
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content .ai-iap\setup-agents.ps1 -Raw), [ref]$null)
          Write-Host "✓ setup-agents.ps1 syntax is valid"
          
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content .ai-iap\validate.ps1 -Raw), [ref]$null)
          Write-Host "✓ validate.ps1 syntax is valid"
          
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content .ai-iap\validate-config.ps1 -Raw), [ref]$null)
          Write-Host "✓ validate-config.ps1 syntax is valid"
          
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content .ai-iap\verify-extension.ps1 -Raw), [ref]$null)
          Write-Host "✓ verify-extension.ps1 syntax is valid"
      
      - name: Run file validation tests
        shell: pwsh
        run: |
          .\.ai-iap\validate.ps1
      
      - name: Run config validation tests
        shell: pwsh
        run: |
          .\.ai-iap\validate-config.ps1
      
      - name: Run extension system tests
        shell: pwsh
        run: |
          .\.ai-iap\verify-extension.ps1

  count-tokens:
    name: Token Cost Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Calculate total tokens
        run: |
          echo "Calculating token costs..."
          total_chars=0
          file_count=0
          
          while IFS= read -r file; do
            chars=$(wc -c < "$file")
            total_chars=$((total_chars + chars))
            file_count=$((file_count + 1))
          done < <(find .ai-iap/rules -name "*.md" -type f)
          
          tokens=$((total_chars / 4))
          echo "📊 Token Cost Summary:"
          echo "  Files: $file_count"
          echo "  Characters: $total_chars"
          echo "  Estimated Tokens: ~$tokens"
          
          if [ $tokens -gt 50000 ]; then
            echo "⚠️  Warning: Total tokens exceed 50,000"
          else
            echo "✓ Token count is optimal"
          fi

