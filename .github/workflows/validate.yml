name: Validate Plugin

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Configuration & Rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate JSON syntax
        run: |
          echo "Validating JSON files..."
          jq empty lib/config.json
          echo "✓ config.json is valid JSON"
          jq empty lib/config.schema.json
          echo "✓ config.schema.json is valid JSON"
          jq empty lib/claude-subagents.json
          echo "✓ claude-subagents.json is valid JSON"
          jq empty .claude-plugin/plugin.json
          echo "✓ plugin.json is valid JSON"
          jq empty .claude-plugin/marketplace.json
          echo "✓ marketplace.json is valid JSON"

      - name: Check plugin structure
        run: |
          echo "Checking plugin directory structure..."
          test -f .claude-plugin/plugin.json || { echo "Missing .claude-plugin/plugin.json"; exit 1; }
          test -f .claude-plugin/marketplace.json || { echo "Missing .claude-plugin/marketplace.json"; exit 1; }
          test -d skills/setup || { echo "Missing skills/setup/"; exit 1; }
          test -f skills/setup/SKILL.md || { echo "Missing skills/setup/SKILL.md"; exit 1; }
          test -d skills/validate || { echo "Missing skills/validate/"; exit 1; }
          test -f skills/validate/SKILL.md || { echo "Missing skills/validate/SKILL.md"; exit 1; }
          test -d agents || { echo "Missing agents/"; exit 1; }
          test -d hooks || { echo "Missing hooks/"; exit 1; }
          test -f hooks/hooks.json || { echo "Missing hooks/hooks.json"; exit 1; }
          test -d lib/rules || { echo "Missing lib/rules/"; exit 1; }
          test -d lib/processes || { echo "Missing lib/processes/"; exit 1; }
          test -d lib/code-library || { echo "Missing lib/code-library/"; exit 1; }
          test -f lib/config.json || { echo "Missing lib/config.json"; exit 1; }
          echo "✓ Plugin structure is valid"

      - name: Check agent files
        run: |
          echo "Checking agent files..."
          for agent in code-reviewer codebase-explorer test-writer docs-writer refactor-helper; do
            test -f "agents/${agent}.md" || { echo "Missing agents/${agent}.md"; exit 1; }
          done
          echo "✓ All agent files exist"

      - name: Validate config against schema
        run: |
          echo "Checking config has required fields..."
          jq -e '.version' lib/config.json > /dev/null
          echo "✓ config has version"
          jq -e '.tool.name' lib/config.json > /dev/null
          echo "✓ config has tool.name"
          jq -e '.languages' lib/config.json > /dev/null
          echo "✓ config has languages"
          LANG_COUNT=$(jq '.languages | length' lib/config.json)
          echo "✓ config has $LANG_COUNT languages"

      - name: Check rule file references
        run: |
          echo "Checking all referenced rule files exist..."
          MISSING=0
          for lang_key in $(jq -r '.languages | keys[]' lib/config.json); do
            for file in $(jq -r ".languages[\"$lang_key\"].files[]" lib/config.json 2>/dev/null); do
              filepath="lib/rules/$lang_key/$file.md"
              if [ ! -f "$filepath" ]; then
                echo "MISSING: $filepath"
                MISSING=$((MISSING + 1))
              fi
            done
            for fw_key in $(jq -r ".languages[\"$lang_key\"].frameworks // {} | keys[]" lib/config.json 2>/dev/null); do
              fw_file=$(jq -r ".languages[\"$lang_key\"].frameworks[\"$fw_key\"].file" lib/config.json)
              if [ -n "$fw_file" ] && [ "$fw_file" != "null" ]; then
                fwpath="lib/rules/$lang_key/frameworks/$fw_file.md"
                if [ ! -f "$fwpath" ]; then
                  echo "MISSING: $fwpath"
                  MISSING=$((MISSING + 1))
                fi
              fi
              for struct_key in $(jq -r ".languages[\"$lang_key\"].frameworks[\"$fw_key\"].structures // {} | keys[]" lib/config.json 2>/dev/null); do
                struct_file=$(jq -r ".languages[\"$lang_key\"].frameworks[\"$fw_key\"].structures[\"$struct_key\"].file" lib/config.json)
                if [ -n "$struct_file" ] && [ "$struct_file" != "null" ]; then
                  spath="lib/rules/$lang_key/frameworks/structures/$struct_file.md"
                  if [ ! -f "$spath" ]; then
                    echo "MISSING: $spath"
                    MISSING=$((MISSING + 1))
                  fi
                fi
              done
            done
          done
          if [ $MISSING -gt 0 ]; then
            echo "❌ $MISSING referenced files are missing"
            exit 1
          fi
          echo "✓ All referenced rule files exist"

      - name: Validate markdown files
        run: |
          echo "Checking markdown files..."
          INVALID=0
          find lib/rules -name "*.md" -type f | while read -r file; do
            if [ ! -s "$file" ]; then
              echo "Empty file: $file"
              INVALID=$((INVALID + 1))
            elif ! head -1 "$file" | grep -q "^#"; then
              echo "Missing header: $file"
              INVALID=$((INVALID + 1))
            fi
          done
          echo "✓ All markdown files are valid"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint markdown files
        run: |
          echo "Linting markdown files..."
          markdownlint '**/*.md' --ignore node_modules || {
            echo "❌ Markdown linting failed"
            echo "Run 'markdownlint **/*.md' locally to see all issues"
            exit 1
          }
          echo "✓ All markdown files pass linting"

      - name: Check persona split files
        run: |
          echo "Checking persona split files..."
          for f in persona-core persona-specialist-software persona-specialist-seo persona-specialist-ui-ux persona-specialist-testing persona-specialist-devops; do
            test -f "lib/rules/general/${f}.md" || { echo "Missing lib/rules/general/${f}.md"; exit 1; }
          done
          echo "✓ All persona split files exist"

  count-tokens:
    name: Token Cost Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Calculate total tokens
        run: |
          echo "Calculating token costs..."
          total_chars=0
          file_count=0

          while IFS= read -r file; do
            chars=$(wc -c < "$file")
            total_chars=$((total_chars + chars))
            file_count=$((file_count + 1))
          done < <(find lib/rules -name "*.md" -type f)

          tokens=$((total_chars / 4))
          echo "📊 Token Cost Summary:"
          echo "  Files: $file_count"
          echo "  Characters: $total_chars"
          echo "  Estimated Tokens: ~$tokens"

          if [ $tokens -gt 50000 ]; then
            echo "⚠️  Warning: Total tokens exceed 50,000"
          else
            echo "✓ Token count is optimal"
          fi
