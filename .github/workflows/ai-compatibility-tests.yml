name: Claude Code Tests

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'critical'
        type: choice
        options:
          - critical
          - all

  schedule:
    - cron: '0 0 * * 0'

  push:
    paths:
      - '.ai-iap/rules/**'
      - '.ai-iap/processes/**'
    branches:
      - main

concurrency:
  group: ai-tests
  cancel-in-progress: true

jobs:
  test-claude:
    name: Test Claude
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: .github/scripts/package.json

      - name: Install dependencies
        run: |
          cd .github/scripts
          npm install

      - name: Run Claude tests
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "⚠️ ANTHROPIC_API_KEY not set - skipping Claude tests"
            echo "Add secret in GitHub Settings → Secrets → Actions → ANTHROPIC_API_KEY"
            exit 0
          fi
          cd .github/scripts
          node test-ai.js \
            --test-suite ${{ github.event.inputs.test_suite || 'critical' }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: claude-results
          path: .github/scripts/test-results/
          retention-days: 30

  analyze-results:
    name: Analyze Results
    runs-on: ubuntu-latest
    needs: [test-claude]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          path: all-results

      - name: Analyze results
        run: |
          cd .github/scripts
          node analyze-results.js ../all-results

      - name: Upload analysis
        uses: actions/upload-artifact@v4
        with:
          name: analysis-report
          path: .github/scripts/analysis-report.md
          retention-days: 90

  report-status:
    name: Report Status
    runs-on: ubuntu-latest
    needs: [analyze-results]
    if: always()

    steps:
      - name: Download analysis
        uses: actions/download-artifact@v4
        with:
          name: analysis-report

      - name: Post to GitHub Summary
        run: |
          cat analysis-report.md >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('analysis-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
